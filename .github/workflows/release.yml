name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g. v0.1.0). Manual runs only."
        required: true

permissions:
  contents: write
  packages: write

jobs:
  # ---------- Build + push Docker image to GHCR ----------
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/opengraph
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------- Create GitHub Release ----------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          TAG="$GITHUB_REF_NAME"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          if [ -f CHANGELOG.md ]; then
            # Extract the section for this version
            awk "/^## \[?${VERSION}\]?/,/^## /" CHANGELOG.md | sed '$d' > /tmp/notes.md
            if [ ! -s /tmp/notes.md ]; then
              echo "Release $TAG" > /tmp/notes.md
            fi
          else
            echo "Release $TAG" > /tmp/notes.md
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.TAG }}
          name: ${{ steps.notes.outputs.TAG }}
          body_path: /tmp/notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
